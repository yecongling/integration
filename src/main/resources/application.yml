#          # 连接池中最大连接数，负数表示没有限制
#          max-active: 20
camel:
  springboot:
    backlog-tracing: false
mybatis-plus:
  mapper-locations: classpath:cn/net/integration/**/mapper/xml/*Mapper.xml
springdoc:
  swagger-ui:
    path: /swagger
sa-token:
  token-prefix: integration
# 文件上传绝对路径
my.upload.path: /root/integration/upload/
# 文件上传根目录
direPath: upload
# 文件上传的根目录的上级绝对路径
rootPath: /root/integration