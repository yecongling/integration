<!DOCTYPE html>
<html>

<head>
    <title>state</title>
</head>

<body>
    <div id="app"></div>
    <script text="text/javascript" src="../js/react.development.js"></script>
    <script text="text/javascript" src="../js/react-dom.development.js"></script>
    <script text="text/javascript" src="../js/babel.min.js"></script>
    <script type="text/babel">
        // 1、创建组件
        class Weather extends React.Component {
            // 构造器调用几次？ -- 1次
            constructor(props) {
                super(props);
                this.state = {
                    isHot: true
                }
                // 可以解决下面的undefined（this的指向问题）
                this.changeWeather = this.changeWeather.bind(this);
            }
            // render调用几次？  1+n次，1是初始化的那次，n是状态更新的次数
            render() {
                const {isHot} = this.state;
                // render放在MyComponent的原型对象上，供实例使用
                return <h2 onClick={this.changeWeather}>今天天气很{isHot ? "炎热" : "凉爽"}</h2>
            }
            // 点几次，调用几次
            changeWeather() {
                // 该方法放在了Weather原型对象上，供实例调用
                // 由于changeWeather是作为onClick的毁掉，所有不是通过实例调用的是直接调用
                // 类中的方法默认开启了局部的严格模式，所以changeWeather的this为undefined
                console.log(this.state.isHot)
                const isHot = this.state.isHot;
                // 严重注意：状态（state）不能进行直接修改，如下面这行代码
                // this.state.isHot = !isHot;
                // 应该通过setState进行更新，切更新是一种合并，不是替换
                this.setState({isHot: !isHot});
            }

        }
        ReactDOM.render(<Weather/>, document.getElementById("app"));
    </script>
    </script>
</body>

</html>
