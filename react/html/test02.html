<!DOCTYPE html>
<html>

<head>
    <title>react初学</title>
</head>

<body>
    <div id="app"></div>
    <script text="text/javascript" src="../js/react.development.js"></script>
    <script text="text/javascript" src="../js/react-dom.development.js"></script>
    <script text="text/javascript" src="../js/babel.min.js"></script>
    <script type="text/babel">
        let arr = [1, 2, 3, 4];
        const VDOM = (
            <div>
                <h1>遍历</h1>
                <ul>
                    {
                        arr.map((item) => {
                            return <li>{item}</li>
                        })
                    }
                </ul>
            </div>
        )
        ReactDOM.render(VDOM, document.getElementById('app'));
    </script>
    </script>
</body>

</html>
