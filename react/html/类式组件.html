<!DOCTYPE html>
<html>

<head>
    <title>类式组件</title>
</head>

<body>
    <div id="app"></div>
    <script text="text/javascript" src="../js/react.development.js"></script>
    <script text="text/javascript" src="../js/react-dom.development.js"></script>
    <script text="text/javascript" src="../js/babel.min.js"></script>
    <script type="text/babel">
        // 1、创建组件
        class MyComponent extends React.Component {
            render() {
                // render放在MyComponent的原型对象上，供实例使用
                return <h2>类式组件</h2>
            }
        }
        ReactDOM.render(<MyComponent/>, document.getElementById("app"));
    </script>
    </script>
</body>

</html>
