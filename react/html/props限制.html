<!DOCTYPE html>
<html>

<head>
    <title>props</title>
</head>

<body>
    <div id="app"></div>
    <div id="app2"></div>
    
    <script text="text/javascript" src="../js/react.development.js"></script>
    <script text="text/javascript" src="../js/react-dom.development.js"></script>
    <script text="text/javascript" src="../js/babel.min.js"></script>
    <script text="text/javascript" src="../js/prop-types.min.js"></script>
    <script type="text/babel">
        // 1、创建组件
        class Person extends React.Component {
            render() {
                const {name, age, sex} = this.props
                return (
                    <ul>
                        <li>姓名：{name}</li> 
                        <li>性别：{sex}</li> 
                        <li>年纪：{age+1}</li>    
                    </ul>
                )
            }
        }
        // 限制组件属性的类型、默认值、必要性的限制
        Person.propTypes = {
            name: PropTypes.string.isRequired,
            sex: PropTypes.string,
            age: PropTypes.number,
            speak: PropTypes.func
        }
        Person.defaultProps = {
            age: 22
        }

        // 渲染组件到页面
        ReactDOM.render(<Person name="123" age="22" sex="男"/>, document.getElementById("app"));
        const p = {name: 12 ,sex:'man'}
        ReactDOM.render(<Person {...p}/>, document.getElementById("app2"));
    </script>
    </script>
</body>

</html>
