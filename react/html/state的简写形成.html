<!DOCTYPE html>
<html>

<head>
    <title>state</title>
</head>

<body>
    <div id="app"></div>
    <script text="text/javascript" src="../js/react.development.js"></script>
    <script text="text/javascript" src="../js/react-dom.development.js"></script>
    <script text="text/javascript" src="../js/babel.min.js"></script>
    <script type="text/babel">
        // 1、创建组件
        class Weather extends React.Component {
            // 初始化状态
            state = {
                isHot: true
            }
            render() {
                const {isHot} = this.state;
                return <h2 onClick={this.changeWeather}>今天天气很{isHot ? "炎热" : "凉爽"}</h2>
            }
            // 自定义方法要用赋值语句+箭头函数
            changeWeather = ()=> {
                const isHot = this.state.isHot;
                this.setState({isHot: !isHot});
            }

        }
        ReactDOM.render(<Weather/>, document.getElementById("app"));
    </script>
    </script>
</body>

</html>
