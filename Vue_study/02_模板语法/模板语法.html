<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>初识</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <!-- 插值语法主要用户标签体内容，写法是{{}}，可以读取data中的所有属性 -->
    <h2>Hello, {{name}}</h2>
    <!-- 指令语法用于解析标签（包括属性、标签体内容、绑定事件等） -->
    <a v-bind:href="url">点我去百度</a>
    <!-- v-bind的简写形式 -->
    <a :href="url">点我去百度</a>
</div>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
        el: '#root',  // Vue实例挂载的dom位置
        data: {
            name: 'ycl',
            url: 'www.baidu.com'
        }
    });
</script>
</body>
</html>
