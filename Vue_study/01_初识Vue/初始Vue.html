<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>初识</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <h2>Hello, {{name}}</h2>
</div>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
       el: '#root',  // Vue实例挂载的dom位置
       data: {
           name: 'ycl'
       }
    });
</script>
</body>
</html>
