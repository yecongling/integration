<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>键盘事件</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <h2>Hello, {{name}}</h2>
    <!--
        Vue中的按键别名
         回车： enter
         退出： esc
         删除： delete
         空格: space
         换行： tab （必须配合keydown使用）
         ……

     -->
    <input type="text" placeholder="按下回车提示输入" @keyup.enter="showInfo">
</div>
<script type="text/javascript">
    Vue.config.productionTip = false;
    // 自定义别名
    Vue.config.keyCodes.huiche = 13
    const vm = new Vue({
        el: '#root',  // Vue实例挂载的dom位置
        data: {
            name: 'ycl'
        },
        methods: {
            showInfo(event) {
                console.log(event.target.value)
            }
        }
    });
</script>
</body>
</html>
