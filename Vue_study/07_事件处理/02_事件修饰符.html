<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>初识</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <h2>Hello, {{name}}</h2>
    <!-- 阻止默认事件 -->
    <a href="www.baidu.com" @click.prevent="showInfo">点我提示信息2（传参数）</a>
    <!-- 阻止事件冒泡 -->
    <a href="www.baidu.com" @click.stop="showInfo">点我提示信息2（传参数）</a>
    <!-- 事件只触发一次 -->
    <a href="www.baidu.com" @click.once="showInfo">点我提示信息2（传参数）</a>
    <!-- 事件在捕获阶段就开始处理 -->
    <div @click.capture="showMsg(1)">
        div1
        <div @click="showMsg(2)">
            div2
        </div>
    </div>
    <!-- 只有event.target的对象是本身元素时才触发 -->
    <div @click.self="showMsg(1)">
        div1
        <div @click="showMsg(2)">
            div2
        </div>
    </div>
    <!-- passive 默认事件优先执行 -->

</div>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
        data: function () {
            // 此处的this是Vue实例对象，且不能写成箭头函数，否则this对象会指到window对象
            return {
                name: 'yck'
            }
        },
        // methods中的函数不要使用箭头函数，否则this对象会丢掉
        methods: {
            showInfo(event) {

                console.log(event.target.innerText)
            },
            showMsg(msg) {

            }
        }
    })
    vm.$mount('#root')
</script>
</body>
</html>
