<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>初识</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <h2>Hello, {{name}}</h2>
    <button v-on:click="showInfo">点我提示信息（不传参数）</button>
    <!-- 简写形式 -->
    <button @click="showInfo2(66, $event)">点我提示信息2（传参数）</button>
</div>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
        data: function () {
            // 此处的this是Vue实例对象，且不能写成箭头函数，否则this对象会指到window对象
            return {
                name: 'yck'
            }
        },
        // methods中的函数不要使用箭头函数，否则this对象会丢掉
        methods: {
            showInfo(event) {
                console.log(event.target.innerText)
            },
            showInfo2(num, event) {
                console.log(event.target.innerText)
            }
        }
    })
    vm.$mount('#root')
</script>
</body>
</html>
