<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>初识</title>
    <script type="text/javascript" src="../basic/vue.js"></script>
</head>
<body>
<!-- 准备好一个 容器 -->
<div id="root">
    <h2>Hello, {{name}}</h2>
</div>
<script type="text/javascript">
    Vue.config.productionTip = false;

    const vm = new Vue({
        // el: '#root', 第一种写法
        // data: {
        //     name: 'ycl'
        // }
        // data的第二种写法
        data:function () {
            // 此处的this是Vue实例对象，且不能写成箭头函数，否则this对象会指到window对象
            return {
                name: 'yck'
            }
        }
    })
    // 挂载元素 第二种写法
    vm.$mount('#root')
</script>
</body>
</html>
