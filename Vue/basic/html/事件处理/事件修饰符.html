<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>初识Vue</title>
        <script src="../../js/vue.js"></script>
    </head>
    <body>

        <!-- 
            Vue中的事件修饰符
            1、prevent：阻止默认事件
            2、stop：阻止事件冒泡
            3、once：事件只触发一次
            4、capture：使用事件的捕获模式
            5、self：只有event.target是当前操作的元素是才触发事件
            6、passive：事件的默认行为立即执行，无需等待事件回调执行完毕
            修饰符可以连续写 .连接
         -->
        <div id="root">
           <h1>你是{{name}}吗</h1>
           <button v-on:click="showInfo">点我提示信息</button>
           <a href="http://www.baidu.com" @click="showInfo">点我提示信息</a>
        </div>
        <script>
            Vue.config.productionTip = false;
            const vm = new Vue({
                data: {
                    name: '傻逼'
                },
                methods: {
                    showInfo(event) {
                        console.log(event.target);
                    },
                }
            });
            vm.$mount('#root');
        </script>
    </body>
</html>
