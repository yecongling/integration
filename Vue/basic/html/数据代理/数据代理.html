<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>初识Vue</title>
        <script src="../../js/vue.js"></script>
    </head>
    <body>
        <div id="root">
           <h1>你是{{name}}吗</h1>
           <h1>我今年{{age}}岁</h1>
        </div>
        <script>
            Vue.config.productionTip = false;
            let number = 3;
            const vm = new Vue({
                data: {
                    name: '傻逼',
                    age: 23
                }
            });
            vm.$mount('#root');
            Object.defineProperty(vm, 'age', {
                value: 17,
                enumerable: true, // 控制属性是否是否可枚举，默认是false
                writable: true, // 控制属性是否可被修改，默认false
                configurable:true, // 控制属性是否可以被删除，默认是false
                // 每次获取这个属性的时候就会调用这个方法
                get: function() {
                    return number;
                }
            })
        </script>
    </body>
</html>
