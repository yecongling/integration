<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>监视属性</title>
    <script src="../../js/vue.js"></script>
</head>
<body>
<!--
    监视属性：
    1、当监视的属性变化时，回调函数会自动调用
    2、监视的属性必须存在才能进行监视
    3、监视属性的两种写法
        1、new Vue时传入watch配置
        2、通过vm.$watch监视
-->
<div id="root">
    <h2>今天天气很{{info}}</h2>
    <button @click="switchWeather">切换天气</button>
</div>
<script>
    Vue.config.productionTip = false;
    const vm = new Vue({
        data: {
            isHot: true
        },
        /* 计算属性 */
        computed: {
            info() {
                return this.isHot ? '炎热': '凉爽'
            }
        },
        methods: {
            switchWeather() {
                this.isHot = !this.isHot
            }
        },
        /* 监视，监视属性的写法还可以写成下面的方式 */
        /*watch: {
            isHot: {
                immediate: true, // 初始化时让handler调用一下
                // 当isHot发生改变是被调用
                handler(newValue, oldValue) {
                    console.log('isHot属性被修改');
                }
            },
            info: {
                handler: function (newValue, oldValue) {
                    console.log('info计算属性被修改');
                }
            }
        }*/
    });
    vm.$mount('#root');
    /* 监视属性的第二种写法 */
    vm.$watch('isHot', {
        immediate: true, // 初始化时让handler调用一下
        // 当isHot发生改变是被调用
        handler(newValue, oldValue) {
            console.log('isHot属性被修改', newValue, oldValue);
        }
    })

</script>
</body>
</html>
